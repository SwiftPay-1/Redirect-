<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiteForge</title>

<!-- Open Graph Meta Tags for Image Preview -->
<meta property="og:title" content="SiteForge - Your Website Builder" />
<meta property="og:description" content="Build amazing websites with SiteForge" />
<meta property="og:image" content="https://eyasinarafat.bro.bd/images/07ee57a2-a23a-40ec-a88a-fbd3c28d4b39.png" />
<meta property="og:url" content="https://yourdomain.com" />
<meta property="og:type" content="website" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://eyasinarafat.bro.bd/images/07ee57a2-a23a-40ec-a88a-fbd3c28d4b39.png" />

<style>
body{
  background:#050516;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
}

svg{
  width:120px;
  height:120px;
  overflow:visible;
}

.lightning{
  fill:none;
  stroke:white;
  stroke-width:8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:400;
  stroke-dashoffset:400;
  animation:draw 1.6s ease forwards;
}

@keyframes draw{
  to{ stroke-dashoffset:0; }
}

.shine{
  fill:none;
  stroke:white;
  stroke-width:4;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:400;
  stroke-dashoffset:400;
  stroke-opacity:0.4;
}

.text{
  font-size:28px;
  font-weight:600;
  letter-spacing:2px;
  border-right:3px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 1.2s steps(9,end) forwards,
             blink 0.6s infinite;
  margin-top:20px;
}

@keyframes typing{
  from{width:0;}
  to{width:9ch;}
}

@keyframes blink{
  0%,100%{border-color:white;}
  50%{border-color:transparent;}
}

</style>
</head>
<body>

<svg viewBox="0 0 100 100">
  <path class="lightning" d="M30 35 L55 15 L55 45 L75 45 L45 85 L45 55 L25 55"/>
  <path class="shine" d="M30 35 L55 15 L55 45 L75 45 L45 85 L45 55 L25 55"/>
</svg>

<div class="text">SiteForge</div>

<script>

const shine = document.querySelector('.shine');
let dashOffset = 400;
const speed = -3;

function animateShine(){
  dashOffset += speed;
  if(dashOffset < -400) dashOffset = 400;
  shine.style.strokeDashoffset = dashOffset;
  const glowIntensity = 0.2 + Math.abs(dashOffset/400) * 0.6; 
  shine.style.strokeOpacity = glowIntensity;
  requestAnimationFrame(animateShine);
}
requestAnimationFrame(animateShine);

const drawDuration = 1600; 
setTimeout(()=>{
  window.location.href = "https://aisiteforge.vercel.app";
}, drawDuration + 2000);
</script>

</body>
</html>
